name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      - name: Logics doc lint
        run: python3 logics/skills/logics-doc-linter/scripts/logics_lint.py

      - name: Typecheck
        run: npm run typecheck
      - name: Typecheck (tests)
        run: npm run typecheck:tests

      - name: Tests (CI config)
        run: npm run test:ci

      - name: Coverage (CI config)
        run: npm run coverage:ci

      - name: Build
        run: npm run build

      - name: Bundle budgets
        run: npm run bundle:check

      - name: Package dist
        run: tar -czf "sentry-dist-${{ github.ref_name }}.tgz" dist

      - name: Resolve curated changelog
        id: release_changelog
        run: node scripts/release/resolve-release-changelog.mjs "${{ github.ref_name }}" --github-output "$GITHUB_OUTPUT"

      - name: Create GitHub release (curated changelog)
        if: steps.release_changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_changelog.outputs.body_path }}
          generate_release_notes: false
          files: "sentry-dist-${{ github.ref_name }}.tgz"

      - name: Create GitHub release (generated fallback)
        if: steps.release_changelog.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "sentry-dist-${{ github.ref_name }}.tgz"
